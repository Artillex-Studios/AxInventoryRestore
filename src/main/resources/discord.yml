# DOCUMENTATION: https://docs.artillex-studios.com/axinventoryrestore.html

# ------- WEBHOOKS -------

# REQUIRED FOR WEBHOOKS
url: ""

# for more webhook options check out the docs: https://docs.artillex-studios.com/discord-webhook-builder.html
backup-create:
  # disabled by default, as it might be spammy on big servers
  enabled: false
  content: ""
  username: ""
  avatar-url: ""
  embeds:
    - title:
        text: New backup created
        url: ""
      description: ""
      color: "#00AAFF"
      timestamp: "%timestamp%"
      image-url: ""
      thumbnail-url: ""
      video-url: ""
      author:
        name: ""
        icon-url: ""
        url: ""
      footer:
        icon-url: ""
        text: ""
      fields:
        - inline: false
          name: Player
          value: "%player%"
        - inline: false
          name: Category
          value: "%category%"
        - inline: false
          name: Extra Info
          value: "%extrainfo%"

backup-restore:
  enabled: true
  content: ""
  username: ""
  avatar-url: ""
  embeds:
    - title:
        text: Backup restored
        url: ""
      description: ""
      color: "#00AAFF"
      timestamp: "%timestamp%"
      image-url: ""
      thumbnail-url: ""
      video-url: ""
      author:
        name: ""
        icon-url: ""
        url: ""
      footer:
        icon-url: ""
        text: ""
      fields:
        - inline: true
          name: Restored by
          value: "%restorer%"
        - inline: true
          name: Player
          value: "%player%"
        - inline: true
          name: Backup Date
          value: "%date%"
        - inline: true
          name: Category
          value: "%category%"
        - inline: true
          name: Extra Info
          value: "%extrainfo%"
        - inline: true
          name: Backup Location
          value: "%location%"

backup-export:
  enabled: true
  content: ""
  username: ""
  avatar-url: ""
  embeds:
    - title:
        text: Backup exported as shulker
        url: ""
      description: ""
      color: "#00AAFF"
      timestamp: "%timestamp%"
      image-url: ""
      thumbnail-url: ""
      video-url: ""
      author:
        name: ""
        icon-url: ""
        url: ""
      footer:
        icon-url: ""
        text: ""
      fields:
        - inline: true
          name: Exported by
          value: "%restorer%"
        - inline: true
          name: Player
          value: "%player%"
        - inline: true
          name: Backup Date
          value: "%date%"
        - inline: true
          name: Category
          value: "%category%"
        - inline: true
          name: Extra Info
          value: "%extrainfo%"
        - inline: true
          name: Backup Location
          value: "%location%"

# ------- DISCORD ADDON -------

# set enable-discord-addon in the config.yml to true if you want to enable this module

# you must create a bot at https://discord.com/developers/applications
# the bot will run on your minecraft server, you don"t need to do anything externally
token: ""

bot-activity: "AxInventoryRestore"

# where should the requests be sent?
channel-id: ""

# the permission needed to interact with a restore request on discord
# list of permissions: https://ci.dv8tion.net/job/JDA5/javadoc/net/dv8tion/jda/api/Permission.html
required-permission: "ADMINISTRATOR"

create-thread: true
thread-name: "Restore"

messages:
  restore: "Restore"
  decline: "Decline"
  restored: "&#FFCC00Your items have been restored to shulkers, check your inventory!"
  accepted: "Successfully accepted restore request!"
  declined: "Successfully declined restore request!"
  # the new color of the embed
  accepted-color: "#00ff00"
  declined-color: "#ff0000"
  no-permission: "You don"t have permission to use this!"

request-restore:
  material: BLUE_DYE
  name: "&#00CCFFRequest restore with a discord bot"
  lore:
    - " "
    - " &7- &#00FFFFUse this to request a restore from a higher ranking staff!"
    - " "
    - "&#00CCFF&l(!) &#00CCFFClick here to request!"

prompt:
  color: "#00aaff"
  title:
    text: "%player% - restore request"
  fields:
    1:
      inline: true
      name: "Requested by"
      value: "%requester%"
    2:
      inline: true
      name: "Creation date"
      value: "%date%"
    3:
      inline: false
      name: "Location"
      value: "%location%"
    4:
      inline: true
      name: "Category"
      value: "%category%"
    5:
      inline: true
      name: "Cause"
      value: "%cause%"

version: 3